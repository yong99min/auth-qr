<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>인증 완료</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    font-family: -apple-system, "Apple SD Gothic Neo", sans-serif;
  }
  .box {
    text-align: center;
  }
  .check {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #2ecc71;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .check svg {
    width: 32px;
    height: 32px;
  }
  h1 {
    font-size: 22px;
    color: #222;
    margin: 0;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
        <path d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h1>인증되었습니다</h1>
  </div>
</body>
</html>
